<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>F-landia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Cormorant+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#8fb89a;
    --verde-prof:#4a7060;
    --verde-musgo:#6a8a6a;
    --agua:#95b8d4;
    --agua-prof:#3a5878;
    --azul-suave:#6890b0;
    --rosa:#e8b8c4;
    --rosa-ant:#c98a8a;
    --celeste:#b8d4e0;
    --lavanda:#b8a8c8;
    --crema:#f5ecd9;
    --crema-cl:#fbf6e8;
    --tinta:#2a3a38;
    --tinta-cl:#4a5a58;
    --niebla:rgba(251,246,232,0.85);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Cormorant Garamond',Georgia,serif;color:var(--tinta);
    background:#1a2828;-webkit-font-smoothing:antialiased;
  }
  /* textura de lienzo */
  .grain{
    position:fixed;inset:0;pointer-events:none;z-index:400;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0 0.82  0 0 0 0.14 0'/></filter><rect width='260' height='260' filter='url(%23n)' opacity='0.6'/></svg>");
    mix-blend-mode:overlay;opacity:.4;
  }

  /* ============ IMMERSION (login + app) ============ */
  .immersion{position:absolute;inset:0;overflow:hidden;z-index:0}
  .painting-up,.painting-dn{
    position:absolute;left:-2%;right:-2%;
    background-size:cover;background-position:center;
  }
  .painting-up{
    top:-2%;height:64%;
  }
  .painting-dn{
    top:60%;height:46%;
    transform:scaleY(-1);
    filter:url(#waterShimmer) blur(.3px) brightness(.9) saturate(.92);
    -webkit-mask-image:linear-gradient(to bottom,black 0%,rgba(0,0,0,0.45) 80%,transparent 100%);
            mask-image:linear-gradient(to bottom,black 0%,rgba(0,0,0,0.45) 80%,transparent 100%);
  }
  .immersion::before{
    content:"";position:absolute;left:0;right:0;top:58%;height:6%;z-index:2;
    background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,0) 100%);
    pointer-events:none;
  }
  .immersion::after{
    content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
    background:
      radial-gradient(ellipse at 50% 45%, transparent 30%, rgba(20,30,30,0.55) 100%),
      linear-gradient(180deg,rgba(20,30,30,0.15) 0%,transparent 35%,transparent 65%,rgba(20,30,30,0.3) 100%);
  }

  /* slide rotativo */
  .slide{position:absolute;inset:0;opacity:0;transition:opacity 4s ease-in-out}
  .slide.active{opacity:1}
  .painting-up,.painting-dn{animation:driftZoom 38s ease-in-out infinite alternate}
  @keyframes driftZoom{
    0%{transform:scale(1) translate(0,0)} 100%{transform:scale(1.08) translate(-1%,-1%)}
  }
  .painting-dn{animation:driftZoomFlip 38s ease-in-out infinite alternate}
  @keyframes driftZoomFlip{
    0%{transform:scaleY(-1) scaleX(1) translate(0,0)} 100%{transform:scaleY(-1.08) scaleX(1.08) translate(-1%,-1%)}
  }

  /* ============ LOGIN ============ */
  #login{
    position:fixed;inset:0;z-index:100;
    transition:opacity 1.4s ease;overflow:hidden;
  }
  #login.gone{opacity:0;pointer-events:none}

  .center{
    position:relative;z-index:5;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:2rem;text-align:center;
  }
  .small-label{
    font-family:'Cormorant SC',serif;font-size:.72rem;letter-spacing:.5em;
    color:var(--crema-cl);opacity:.75;margin-bottom:1.4rem;padding-left:.5em;
    text-shadow:0 2px 8px rgba(0,0,0,0.4);
  }
  .small-label::before,.small-label::after{content:"·";margin:0 .8em;opacity:.6}
  .proposal{
    font-family:'Playfair Display',serif;font-weight:400;font-style:italic;
    font-size:clamp(2.4rem,5.2vw,4.6rem);line-height:1.1;
    color:var(--crema-cl);
    margin:0 0 1.2rem;
    text-shadow:0 4px 24px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.1);
    animation:fadeUp 1.8s cubic-bezier(.2,.8,.2,1) both .3s;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .hint{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:1.05rem;color:var(--crema-cl);opacity:.78;
    margin-bottom:1.8rem;letter-spacing:.04em;
    text-shadow:0 2px 10px rgba(0,0,0,0.4);
    animation:fadeUp 1.8s cubic-bezier(.2,.8,.2,1) both .6s;
  }
  .pwd-box{
    position:relative;animation:fadeUp 1.8s cubic-bezier(.2,.8,.2,1) both .9s;
  }
  .pwd-box input{
    width:200px;height:80px;
    background:rgba(251,246,232,0.18);
    backdrop-filter:blur(12px) saturate(1.1);
    border:1px solid rgba(251,246,232,0.35);
    color:var(--crema-cl);
    font-family:'Cormorant Garamond',serif;font-size:1.4rem;
    text-align:center;letter-spacing:.2em;outline:none;
    border-radius:2px;
    box-shadow:
      0 12px 40px rgba(0,0,0,0.35),
      inset 0 0 30px rgba(251,246,232,0.08);
    transition:all .5s;
  }
  .pwd-box input::placeholder{opacity:0}
  .pwd-box input:focus{
    border-color:rgba(251,246,232,0.7);
    background:rgba(251,246,232,0.25);
    box-shadow:0 12px 50px rgba(0,0,0,0.4),inset 0 0 40px rgba(251,246,232,0.15);
  }
  .err{
    color:#f5d5d5;font-style:italic;font-size:.95rem;margin-top:1rem;min-height:1.2em;
    text-shadow:0 2px 8px rgba(0,0,0,0.5);
    font-family:'Cormorant Garamond',serif;
  }

  /* ============ CELEBRATION ============ */
  #celebration{
    position:fixed;inset:0;z-index:150;display:none;
    align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,rgba(251,246,232,0.96) 0%,rgba(184,212,224,0.95) 100%);
    animation:fadeIn .8s ease both;
  }
  #celebration.show{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .big-yes{
    font-family:'Playfair Display',serif;font-style:italic;font-weight:400;
    font-size:clamp(8rem,22vw,22rem);
    color:var(--agua-prof);
    line-height:.9;
    animation:yesIn 1.4s cubic-bezier(.2,.7,.3,1.4) both;
    text-shadow:0 8px 40px rgba(58,88,120,0.35);
  }
  @keyframes yesIn{from{opacity:0;transform:scale(.4) rotate(-6deg)}to{opacity:1;transform:scale(1) rotate(-2deg)}}
  .petals{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
  .petal{
    position:absolute;top:-8vh;width:14px;height:16px;
    border-radius:0 100% 0 100%;opacity:.9;
    animation:petalFall linear forwards;
  }
  @keyframes petalFall{
    0%{transform:translate(0,0) rotate(0);opacity:1}
    50%{transform:translate(60px,55vh) rotate(360deg)}
    100%{transform:translate(-30px,115vh) rotate(720deg);opacity:0}
  }

  /* ============ APP ============ */
  #app{
    position:fixed;inset:0;display:none;flex-direction:column;
    opacity:0;transition:opacity 1.4s ease;background:#1a2828;
  }
  #app.show{display:flex;opacity:1}

  /* nenúfares */
  .lilies{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
  .lily{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,var(--rosa),var(--lavanda) 60%,transparent 78%);
    opacity:.35;filter:blur(2.5px);animation:drift linear infinite;
  }
  @keyframes drift{0%{transform:translate(0,0) rotate(0)}100%{transform:translate(120vw,-30vh) rotate(360deg)}}

  header{
    position:relative;z-index:3;padding:1.4rem 2rem;
    display:flex;align-items:center;justify-content:space-between;gap:1rem;
    background:linear-gradient(180deg,rgba(251,246,232,0.18) 0%,rgba(251,246,232,0) 100%);
    backdrop-filter:blur(6px);
  }
  header h2{
    font-family:'Playfair Display',serif;font-weight:400;font-style:italic;
    font-size:1.9rem;color:var(--crema-cl);letter-spacing:.02em;line-height:1;
    text-shadow:0 3px 14px rgba(0,0,0,0.45);
  }
  header .sub{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    color:var(--crema-cl);opacity:.78;font-size:.92rem;
    text-shadow:0 2px 8px rgba(0,0,0,0.4);
  }
  .logout{
    background:rgba(251,246,232,0.15);
    backdrop-filter:blur(10px);
    border:1px solid rgba(251,246,232,0.35);
    color:var(--crema-cl);padding:.5rem 1.2rem;cursor:pointer;
    font-family:'Cormorant SC',serif;letter-spacing:.25em;font-size:.72rem;
    transition:all .4s;border-radius:99px;
  }
  .logout:hover{background:rgba(251,246,232,0.3);transform:translateY(-1px)}

  main{position:relative;z-index:3;flex:1;overflow-y:auto;padding:1.6rem 2rem 6rem}
  main::-webkit-scrollbar{width:8px}
  main::-webkit-scrollbar-track{background:rgba(251,246,232,0.08)}
  main::-webkit-scrollbar-thumb{background:rgba(251,246,232,0.4);border-radius:4px}

  .tabs{
    display:flex;gap:.5rem;justify-content:center;margin-bottom:2rem;
    flex-wrap:wrap;
  }
  .tab{
    background:rgba(251,246,232,0.18);
    backdrop-filter:blur(10px);
    border:1px solid rgba(251,246,232,0.3);
    color:var(--crema-cl);
    padding:.6rem 1.3rem;cursor:pointer;
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:1rem;letter-spacing:.04em;
    transition:all .4s;border-radius:99px;
    text-shadow:0 2px 8px rgba(0,0,0,0.3);
  }
  .tab:hover{background:rgba(251,246,232,0.3);transform:translateY(-2px)}
  .tab.active{
    background:linear-gradient(135deg,rgba(143,184,154,0.85) 0%,rgba(104,144,176,0.85) 100%);
    border-color:rgba(251,246,232,0.6);
    box-shadow:0 6px 22px rgba(74,112,96,0.45);
    text-shadow:none;
  }

  .toolbar{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:1.6rem;flex-wrap:wrap;gap:1rem;
  }
  .toolbar .filter{
    background:rgba(251,246,232,0.85);border:1px solid rgba(74,112,96,0.3);
    padding:.55rem 1rem;
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;
    color:var(--tinta);border-radius:99px;min-width:200px;outline:none;
  }
  .add-btn{
    background:linear-gradient(135deg,var(--rosa-ant) 0%,var(--rosa) 100%);
    color:var(--crema-cl);border:none;
    padding:.6rem 1.4rem;
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;
    cursor:pointer;border-radius:99px;
    box-shadow:0 8px 24px rgba(201,138,138,0.4);transition:all .4s;
  }
  .add-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(201,138,138,0.55)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.3rem}
  .item{
    background:var(--niebla);backdrop-filter:blur(14px);
    padding:1.4rem 1.4rem 1.1rem;
    border-radius:18px 18px 22px 6px;
    border:1px solid rgba(74,112,96,0.18);
    box-shadow:
      0 16px 42px rgba(20,30,30,0.32),
      inset 0 1px 0 rgba(255,255,255,0.4);
    transition:all .5s ease;position:relative;
    animation:rise .8s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .item:nth-child(2n){border-radius:22px 6px 18px 18px}
  .item:nth-child(3n){border-radius:6px 18px 18px 22px}
  .item:hover{transform:translateY(-4px);box-shadow:0 24px 55px rgba(20,30,30,0.4)}
  .item.done{opacity:.78}
  .item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:.7rem;margin-bottom:.4rem}
  .item h3{
    font-family:'Playfair Display',serif;font-weight:500;font-size:1.3rem;
    color:var(--verde-prof);line-height:1.2;
  }
  .item .badge{
    font-family:'Cormorant SC',serif;font-size:.62rem;letter-spacing:.24em;
    padding:.3rem .7rem;border-radius:99px;white-space:nowrap;
  }
  .badge.pend{background:rgba(232,184,196,0.55);color:#7a3a48}
  .badge.done{background:rgba(143,184,154,0.55);color:#3a4a30}
  .item .place{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    color:var(--tinta-cl);font-size:.95rem;margin-bottom:.5rem;
  }
  .item .notes{
    font-family:'Cormorant Garamond',serif;
    color:var(--tinta);font-size:1.02rem;line-height:1.5;margin-bottom:.7rem;
  }
  .hearts{font-size:1.05rem;letter-spacing:.12em;margin-bottom:.7rem;color:#ccc}
  .hearts span{cursor:pointer;transition:transform .2s}
  .hearts span:hover{transform:scale(1.25)}
  .hearts span.on{color:#c98a8a}
  .actions{display:flex;gap:.4rem;justify-content:flex-end;flex-wrap:wrap;
    border-top:1px dashed rgba(74,112,96,0.18);padding-top:.6rem;
  }
  .icon-btn{
    background:transparent;border:1px solid rgba(74,112,96,0.35);
    color:var(--verde-prof);padding:.32rem .75rem;cursor:pointer;
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.85rem;
    border-radius:99px;transition:all .4s;
  }
  .icon-btn:hover{background:var(--verde-prof);color:var(--crema-cl);border-color:var(--verde-prof)}
  .icon-btn.del:hover{background:#9a4040;border-color:#9a4040}

  .empty{
    text-align:center;padding:4rem 1rem;color:var(--crema-cl);
    font-family:'Playfair Display',serif;font-style:italic;font-size:1.5rem;opacity:.9;
    text-shadow:0 2px 14px rgba(0,0,0,0.5);
  }

  /* ============ ROCOLA ============ */
  .rocola{position:fixed;bottom:1.5rem;right:1.5rem;z-index:30}
  .rocola-btn{
    width:60px;height:60px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,var(--rosa) 0%,var(--rosa-ant) 50%,var(--lavanda) 100%);
    border:2px solid rgba(251,246,232,0.6);
    color:var(--crema-cl);cursor:pointer;
    box-shadow:0 12px 30px rgba(0,0,0,0.4),inset 0 2px 0 rgba(255,255,255,0.3);
    display:flex;align-items:center;justify-content:center;
    transition:transform .5s;animation:spin 8s linear infinite;
  }
  .rocola-btn:hover{transform:scale(1.08)}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .rocola-panel{
    position:absolute;bottom:72px;right:0;width:340px;
    background:linear-gradient(180deg,rgba(58,88,120,0.95) 0%,rgba(42,58,56,0.97) 100%);
    border:1px solid rgba(251,246,232,0.3);border-radius:14px;
    padding:1rem;opacity:0;transform:translateY(10px) scale(.95);
    pointer-events:none;transition:all .4s;
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
    backdrop-filter:blur(20px);
  }
  .rocola.open .rocola-panel{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  .rocola.open .rocola-btn{animation:none}
  .rocola-label{
    font-family:'Cormorant SC',serif;font-size:.7rem;letter-spacing:.4em;
    color:var(--crema-cl);text-align:center;margin-bottom:.7rem;opacity:.85;
  }
  .rocola-label::before,.rocola-label::after{content:"·";margin:0 .5em}
  .rocola-frame{background:#000;border-radius:8px;overflow:hidden}
  .rocola-frame iframe{display:block;width:100%;height:152px;border:0}
  .rocola-empty{
    color:var(--crema-cl);font-family:'Cormorant Garamond',serif;font-style:italic;
    text-align:center;padding:2rem 1rem;font-size:.95rem;line-height:1.5;opacity:.85;
  }

  /* Modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(20,30,30,0.78);backdrop-filter:blur(8px);
    z-index:80;display:none;align-items:center;justify-content:center;padding:1rem;
  }
  .modal-bg.show{display:flex;animation:fadeIn .3s}
  .modal{
    background:var(--crema-cl);padding:2.4rem;border-radius:20px 6px 20px 6px;
    width:100%;max-width:520px;
    box-shadow:0 35px 80px rgba(0,0,0,0.5);
    animation:floatInM .55s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes floatInM{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .modal h3{
    font-family:'Playfair Display',serif;font-style:italic;font-weight:400;
    font-size:1.7rem;color:var(--verde-prof);text-align:center;margin-bottom:1.4rem;
  }
  .modal label{
    display:block;font-family:'Cormorant SC',serif;font-size:.72rem;
    letter-spacing:.3em;color:var(--verde-prof);margin-bottom:.3rem;margin-top:1rem;
  }
  .modal input,.modal textarea,.modal select{
    width:100%;padding:.7rem .9rem;border:1px solid rgba(74,112,96,0.3);
    font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--tinta);
    background:white;border-radius:8px;outline:none;
  }
  .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--verde-prof)}
  .modal textarea{resize:vertical;min-height:80px;font-family:inherit}
  .modal .row{display:flex;gap:.7rem;margin-top:1.6rem;justify-content:flex-end;flex-wrap:wrap}
  .modal .btn{
    background:linear-gradient(135deg,var(--verde) 0%,var(--azul-suave) 100%);
    color:var(--crema-cl);border:none;padding:.65rem 1.6rem;
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;
    cursor:pointer;border-radius:99px;
    box-shadow:0 8px 22px rgba(74,112,96,0.35);transition:all .4s;
  }
  .modal .btn:hover{transform:translateY(-2px)}

  @media (max-width:680px){
    .center{padding:1.5rem}
    header{padding:1rem 1.2rem;flex-wrap:wrap}
    header h2{font-size:1.5rem}
    main{padding:1.2rem 1rem 5rem}
    .tabs{gap:.35rem}
    .tab{font-size:.85rem;padding:.5rem 1rem}
    .rocola-panel{width:280px}
    .pwd-box input{width:170px;height:70px}
  }
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0" aria-hidden="true">
  <defs>
    <filter id="waterShimmer" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.028" numOctaves="2" seed="4" result="noise">
        <animate attributeName="baseFrequency" dur="22s" values="0.014 0.028; 0.02 0.036; 0.014 0.028" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div class="grain"></div>
<div class="petals" id="petals"></div>

<!-- ============ LOGIN ============ -->
<section id="login">
  <div class="immersion" id="loginImm"></div>
  <div class="center">
    <p class="small-label">F&middot;LANDIA</p>
    <h1 class="proposal">¿Querés ser mi novia?</h1>
    <p class="hint">sin presión, es una formalidad ;)</p>
    <form id="loginForm" class="pwd-box">
      <input type="text" id="pwd" autocomplete="off" spellcheck="false" autofocus />
    </form>
    <div class="err" id="err"></div>
  </div>
</section>

<!-- ============ CELEBRACIÓN ============ -->
<section id="celebration">
  <div class="big-yes">Sí.</div>
</section>

<!-- ============ APP ============ -->
<section id="app">
  <div class="immersion" id="appImm"></div>
  <div class="lilies" id="lilies"></div>

  <header>
    <div>
      <h2>Nuestro Atelier</h2>
      <div class="sub">una colección hecha de dos</div>
    </div>
    <button class="logout" id="logoutBtn">Salir</button>
  </header>

  <main>
    <div class="tabs">
      <button class="tab active" data-cat="restoran">Restoranes &amp; Cafés</button>
      <button class="tab" data-cat="lugar">Lugares</button>
      <button class="tab" data-cat="cine">Películas y música</button>
      <button class="tab" data-cat="viaje">Viajes</button>
      <button class="tab" data-cat="meta">Metas y Escrituras</button>
    </div>
    <div class="toolbar">
      <select class="filter" id="statusFilter">
        <option value="all">todos</option>
        <option value="pend">pendientes</option>
        <option value="done">hechos</option>
      </select>
      <button class="add-btn" id="addBtn">+ Agregar</button>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <!-- ROCOLA -->
  <div class="rocola" id="rocola">
    <button class="rocola-btn" id="rocolaBtn" aria-label="rocola">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
        <path d="M12 4 A8 8 0 0 1 20 12"/>
      </svg>
    </button>
    <div class="rocola-panel" id="rocolaPanel">
      <div class="rocola-label">música del jardín</div>
      <div class="rocola-frame" id="rocolaFrame"></div>
    </div>
  </div>
</section>

<!-- ============ MODAL ============ -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Agregar</h3>
    <form id="itemForm">
      <input type="hidden" id="itemId" />
      <label>Nombre</label>
      <input type="text" id="fName" required />
      <label>Sección</label>
      <select id="fCat">
        <option value="restoran">Restoranes &amp; Cafés</option>
        <option value="lugar">Lugares</option>
        <option value="cine">Películas y música</option>
        <option value="viaje">Viajes</option>
        <option value="meta">Metas y Escrituras</option>
      </select>
      <label>Dónde</label>
      <input type="text" id="fPlace" placeholder="Palermo, Buenos Aires..." />
      <label>Notas</label>
      <textarea id="fNotes" placeholder="qué nos gustó, cuándo, con quién..."></textarea>
      <label>Estado</label>
      <select id="fStatus">
        <option value="pend">pendiente</option>
        <option value="done">hecho</option>
      </select>
      <div class="row">
        <button type="button" class="icon-btn" id="cancelBtn">Cancelar</button>
        <button type="submit" class="btn">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script>
/* ============================================================
   SPOTIFY — pegá acá tu link de playlist (publica) o canción
   ============================================================ */
const SPOTIFY_URL = 'https://open.spotify.com/playlist/00d0bkNk9QzQtzrsC9vkQg';
/* ============================================================ */

const PASSWORDS = ['si','sí','ok','okay','quiero','enter','dale','obvio','fortuna','yes'];
const normalize = s => s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const NORM_PWDS = PASSWORDS.map(normalize);

const loginEl=document.getElementById('login'),appEl=document.getElementById('app'),
      celEl=document.getElementById('celebration'),errEl=document.getElementById('err');

document.getElementById('loginForm').addEventListener('submit',e=>{
  e.preventDefault();
  const v=normalize(document.getElementById('pwd').value);
  if(NORM_PWDS.includes(v)){sessionStorage.setItem('giverny_in','1');celebrate();}
  else{
    errEl.textContent='probá de nuevo…';
    document.getElementById('pwd').value='';
    setTimeout(()=>errEl.textContent='',2800);
  }
});
document.getElementById('logoutBtn').addEventListener('click',()=>{
  sessionStorage.removeItem('giverny_in');location.reload();
});

function celebrate(){
  loginEl.classList.add('gone');
  celEl.classList.add('show');
  rainPetals(80);
  setTimeout(()=>{
    celEl.style.transition='opacity 1.2s ease';celEl.style.opacity='0';
    setTimeout(()=>{loginEl.style.display='none';celEl.style.display='none';enter();},1200);
  },3400);
}
function rainPetals(n){
  const c=document.getElementById('petals');
  const colors=['#e8b8c4','#c98a8a','#b8d4e0','#b8a8c8','#8fb89a','#f5d4dc'];
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='petal';
    p.style.left=Math.random()*100+'%';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.width=(8+Math.random()*10)+'px';p.style.height=(10+Math.random()*10)+'px';
    p.style.animationDelay=(Math.random()*2.5)+'s';
    p.style.animationDuration=(4+Math.random()*4)+'s';
    p.style.opacity=.6+Math.random()*.4;
    c.appendChild(p);
  }
  setTimeout(()=>c.innerHTML='',10000);
}
function enter(){
  appEl.classList.add('show');
  initImmersion('appImm',APP_PAINTINGS,true);
  initLilies();initRocola();render();
}
if(sessionStorage.getItem('giverny_in')==='1'){loginEl.style.display='none';enter();}

/* ===== inmersión: pintura con reflejo en agua ===== */
const LOGIN_PAINTINGS=[
  {url:'puente.jpg', grad:'linear-gradient(180deg,#7a9a8a 0%,#5a7a7a 35%,#4a7090 60%,#3a6080 100%)'}
];
const APP_PAINTINGS=[
  {url:'nenufares.jpg', grad:'linear-gradient(180deg,#9ab4c4 0%,#6a8aa4 40%,#4a6a8a 100%)'},
  {url:'puente.jpg',   grad:'linear-gradient(180deg,#7a9a8a 0%,#5a7a7a 50%,#3a6080 100%)'},
  {url:'amanecer.jpg', grad:'linear-gradient(180deg,#e0b8a8 0%,#b89090 40%,#7080a0 100%)'},
  {url:'almiares.jpg', grad:'linear-gradient(180deg,#c8b078 0%,#9a8050 50%,#5a4a40 100%)'}
];
function initImmersion(id,paintings,rotate){
  const c=document.getElementById(id);c.innerHTML='';
  paintings.forEach((p,i)=>{
    const slide=document.createElement('div');slide.className='slide'+(i===0?' active':'');
    const bg="url('"+p.url+"'),"+p.grad;
    const up=document.createElement('div');up.className='painting-up';
    up.style.backgroundImage=bg;up.style.animationDelay=(i*-4)+'s';
    const dn=document.createElement('div');dn.className='painting-dn';
    dn.style.backgroundImage=bg;dn.style.animationDelay=(i*-4)+'s';
    slide.appendChild(up);slide.appendChild(dn);c.appendChild(slide);
  });
  if(rotate && paintings.length>1){
    let idx=0;
    setInterval(()=>{
      const slides=c.querySelectorAll('.slide');
      slides[idx].classList.remove('active');
      idx=(idx+1)%slides.length;
      slides[idx].classList.add('active');
    },11000);
  }
}
initImmersion('loginImm',LOGIN_PAINTINGS,false);

function initLilies(){
  const c=document.getElementById('lilies');
  for(let i=0;i<14;i++){
    const l=document.createElement('div');l.className='lily';
    const size=22+Math.random()*60;
    l.style.width=size+'px';l.style.height=size+'px';
    l.style.left=(-10+Math.random()*30)+'%';l.style.top=(60+Math.random()*60)+'%';
    l.style.animationDuration=(40+Math.random()*60)+'s';l.style.animationDelay=(-Math.random()*60)+'s';
    l.style.opacity=.18+Math.random()*.3;
    c.appendChild(l);
  }
}

/* ===== ROCOLA ===== */
function initRocola(){
  const frame=document.getElementById('rocolaFrame');
  const m=SPOTIFY_URL.match(/spotify\.com\/(playlist|track|album|episode|artist)\/([a-zA-Z0-9]+)/);
  if(m){
    const iframe=document.createElement('iframe');
    iframe.src='https://open.spotify.com/embed/'+m[1]+'/'+m[2]+'?utm_source=generator&theme=0';
    iframe.allow='encrypted-media; clipboard-write; picture-in-picture';iframe.loading='lazy';
    frame.appendChild(iframe);
  } else {
    frame.innerHTML='<div class="rocola-empty">pegá un link de Spotify</div>';
  }
  document.getElementById('rocolaBtn').addEventListener('click',()=>{
    document.getElementById('rocola').classList.toggle('open');
  });
}

/* ===== ITEMS ===== */
const KEY='flandia_items_v1';
let items=JSON.parse(localStorage.getItem(KEY)||'null')||[
  {id:uid(),name:'Florentin',cat:'restoran',place:'Palermo',notes:'',status:'pend',hearts:0},
  {id:uid(),name:'Fino',cat:'restoran',place:'Palermo',notes:'',status:'pend',hearts:0},
  {id:uid(),name:'Arredondo',cat:'restoran',place:'',notes:'',status:'pend',hearts:0},
  {id:uid(),name:'Kalis',cat:'restoran',place:'',notes:'',status:'pend',hearts:0},
  {id:uid(),name:'Anchoíta',cat:'restoran',place:'Chacarita',notes:'',status:'pend',hearts:0},
  {id:uid(),name:'Birkin',cat:'restoran',place:'Palermo Soho',notes:'café de mañana',status:'pend',hearts:0},
  {id:uid(),name:'Showcase',cat:'lugar',place:'Buenos Aires',notes:'',status:'pend',hearts:0},
  {id:uid(),name:'Museo Malba',cat:'lugar',place:'Av. Figueroa Alcorta 3415',notes:'colección + café',status:'pend',hearts:0},
  {id:uid(),name:'Bosques de Palermo',cat:'lugar',place:'CABA',notes:'caminata + mate al atardecer',status:'pend',hearts:0},
  {id:uid(),name:'Maratón de cine francés',cat:'cine',place:'en casa',notes:'Amélie, La Vie en Rose, Le Fabuleux Destin…',status:'pend',hearts:0},
  {id:uid(),name:'',cat:'viaje',place:'',notes:'',status:'pend',hearts:0},
  {id:uid(),name:'',cat:'meta',place:'',notes:'',status:'pend',hearts:0}
].filter(x=>x.name);
function uid(){return Math.random().toString(36).slice(2,9)}
function save(){localStorage.setItem(KEY,JSON.stringify(items))}

let currentCat='restoran',currentStatus='all';
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');currentCat=t.dataset.cat;render();
  });
});
document.getElementById('statusFilter').addEventListener('change',e=>{currentStatus=e.target.value;render();});

function render(){
  const grid=document.getElementById('grid');
  const list=items.filter(i=>i.cat===currentCat).filter(i=>currentStatus==='all'||i.status===currentStatus);
  if(!list.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1">esta sala todavía espera su primera obra…</div>';return;}
  grid.innerHTML=list.map(i=>`
    <div class="item ${i.status==='done'?'done':''}">
      <div class="top">
        <h3>${esc(i.name)}</h3>
        <span class="badge ${i.status==='done'?'done':'pend'}">${i.status==='done'?'hecho':'pendiente'}</span>
      </div>
      ${i.place?`<div class="place">${esc(i.place)}</div>`:''}
      ${i.notes?`<div class="notes">${esc(i.notes)}</div>`:''}
      <div class="hearts" data-id="${i.id}">${[1,2,3,4,5].map(n=>`<span class="${n<=i.hearts?'on':''}" data-n="${n}">&hearts;</span>`).join('')}</div>
      <div class="actions">
        <button class="icon-btn" onclick="toggleStatus('${i.id}')">${i.status==='done'?'pendiente':'hecho'}</button>
        <button class="icon-btn" onclick="edit('${i.id}')">editar</button>
        <button class="icon-btn del" onclick="del('${i.id}')">borrar</button>
      </div>
    </div>`).join('');
  document.querySelectorAll('.hearts').forEach(h=>{
    h.querySelectorAll('span').forEach(s=>{
      s.addEventListener('click',()=>{
        const id=h.dataset.id,n=+s.dataset.n;
        const it=items.find(x=>x.id===id);
        it.hearts=it.hearts===n?n-1:n;save();render();
      });
    });
  });
}
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

window.toggleStatus=id=>{const it=items.find(x=>x.id===id);it.status=it.status==='done'?'pend':'done';save();render();};
window.del=id=>{if(!confirm('¿borrar?'))return;items=items.filter(x=>x.id!==id);save();render();};
window.edit=id=>openModal(items.find(x=>x.id===id));

const modalBg=document.getElementById('modalBg');
document.getElementById('addBtn').addEventListener('click',()=>openModal());
document.getElementById('cancelBtn').addEventListener('click',closeModal);
modalBg.addEventListener('click',e=>{if(e.target===modalBg)closeModal()});
function openModal(it){
  document.getElementById('modalTitle').textContent=it?'Editar':'Agregar';
  document.getElementById('itemId').value=it?.id||'';
  document.getElementById('fName').value=it?.name||'';
  document.getElementById('fCat').value=it?.cat||currentCat;
  document.getElementById('fPlace').value=it?.place||'';
  document.getElementById('fNotes').value=it?.notes||'';
  document.getElementById('fStatus').value=it?.status||'pend';
  modalBg.classList.add('show');
}
function closeModal(){modalBg.classList.remove('show')}
document.getElementById('itemForm').addEventListener('submit',e=>{
  e.preventDefault();
  const id=document.getElementById('itemId').value;
  const data={name:document.getElementById('fName').value.trim(),cat:document.getElementById('fCat').value,place:document.getElementById('fPlace').value.trim(),notes:document.getElementById('fNotes').value.trim(),status:document.getElementById('fStatus').value};
  if(id){Object.assign(items.find(x=>x.id===id),data);}
  else{items.unshift({id:uid(),hearts:0,...data});}
  save();closeModal();
  document.querySelectorAll('.tab').forEach(t=>{t.classList.toggle('active',t.dataset.cat===data.cat);});
  currentCat=data.cat;render();
});
</script>
</body>
</html>
